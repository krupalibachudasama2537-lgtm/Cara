name: Standard Welcome Bot

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new contributor
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Welcome to Cara! 🛍️\n\nThank you so much for opening this pull request. We really appreciate your contribution to this e-commerce platform!\n\n**Next Steps:**\n- Ensure your code follows the coding standard.\n- A maintainer will review your changes shortly.`
            })
