name: Outdated Dependency Monitor

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  outdated-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: List Outdated Packages
        run: npm outdated || true
