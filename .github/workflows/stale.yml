name: Close Stale Issues & PRs

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue is stale because it has been inactive for 30 days.'
          stale-pr-message: 'This PR is stale because it has been inactive for 30 days.'
          days-before-stale: 30
          days-before-close: 7

# Automates stale ticket and pull request cleanup routines after periods of inactivity.