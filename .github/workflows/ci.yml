name: Code Quality & CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Linter
        run: npm run lint

      - name: Verify Formatting
        run: npm run format:check

      - name: Run HTMLHint Checks
        run: |
          echo "Verifying project HTML/CSS files..."
          npx htmlhint "**/*.html" || true

# Continuous integration build validation pipeline for syntax and formatting checks.